workflows:
  android-workflow:
    name: VVF APK Build
    max_build_duration: 30
    environment:
      flutter: 3.19.0
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
