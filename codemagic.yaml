workflows:
  android-workflow:
    name: VVF APK Build
    max_build_duration: 30
    environment:
      flutter: 3.19.0
      java: 17
    scripts:
      - name: Save custom files
        script: |
          mkdir -p /tmp/vvf/lib /tmp/vvf/assets
          cp lib/main.dart /tmp/vvf/lib/main.dart
          cp pubspec.yaml /tmp/vvf/pubspec.yaml
          cp android/app/src/main/AndroidManifest.xml /tmp/vvf/AndroidManifest.xml
          cp assets/logo.jpg /tmp/vvf/logo.jpg 2>/dev/null || echo "no logo"

      - name: Generate Flutter scaffold
        script: |
          flutter create --org com.vishwavijayaa --project-name vvf_duplicate_finder /tmp/scaffold
          rsync -av /tmp/scaffold/ . --exclude='.git' --exclude='lib/' --exclude='pubspec.yaml'

      - name: Restore custom files
        script: |
          cp /tmp/vvf/lib/main.dart lib/main.dart
          cp /tmp/vvf/pubspec.yaml pubspec.yaml
          cp /tmp/vvf/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          mkdir -p assets
          cp /tmp/vvf/logo.jpg assets/logo.jpg 2>/dev/null || echo "no logo"

      - name: Generate signing key
        script: |
          keytool -genkey -v \
            -keystore /tmp/vvf-key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias vvf \
            -storepass vvfpass123 \
            -keypass vvfpass123 \
            -dname "CN=VVF,O=VishwaVijayaa,C=IN"

          cat > android/key.properties << EOF
          storePassword=vvfpass123
          keyPassword=vvfpass123
          keyAlias=vvf
          storeFile=/tmp/vvf-key.jks
          EOF

      - name: Configure signing in build.gradle
        script: |
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
          def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

          def keyProps = new Properties()
          def keyFile = rootProject.file('key.properties')
          if (keyFile.exists()) keyProps.load(new FileInputStream(keyFile))

          android {
              namespace "com.vishwavijayaa.vvf_duplicate_finder"
              compileSdk flutter.compileSdkVersion
              ndkVersion flutter.ndkVersion

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }

              defaultConfig {
                  applicationId "com.vishwavijayaa.vvf_duplicate_finder"
                  minSdkVersion 21
                  targetSdkVersion flutter.targetSdkVersion
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
              }

              signingConfigs {
                  release {
                      keyAlias keyProps['keyAlias']
                      keyPassword keyProps['keyPassword']
                      storeFile keyProps['storeFile'] ? file(keyProps['storeFile']) : null
                      storePassword keyProps['storePassword']
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled true
                      shrinkResources true
                  }
              }
          }

          flutter {
              source '../..'
          }

          dependencies {}
          EOF

      - name: Get packages
        script: flutter pub get

      - name: Build Release APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
